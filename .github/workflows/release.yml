name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ARTIFACT_NAME: auto-memories-aarch64-apple-darwin
  TARBALL: auto-memories-aarch64-apple-darwin.tar.gz

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p "${ARTIFACT_NAME}"
          cp target/release/auto-memories "${ARTIFACT_NAME}/"
          tar czf "${TARBALL}" "${ARTIFACT_NAME}"

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.TARBALL }}
          if-no-files-found: error
          retention-days: 1

  verify:
    needs: build
    runs-on: macos-14
    steps:
      - name: Download packaged tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/release-verify

      - name: Smoke-test packaged binary in a clean environment
        shell: bash
        env:
          VERIFY_DIR: ${{ runner.temp }}/release-verify
        run: |
          set -euo pipefail

          export PATH="/usr/bin:/bin:/usr/sbin:/sbin"
          unset CARGO_HOME RUSTUP_HOME CARGO_TARGET_DIR

          cd "${VERIFY_DIR}"
          tar xzf "${TARBALL}"
          BIN="${VERIFY_DIR}/${ARTIFACT_NAME}/auto-memories"
          test -x "${BIN}"
          # It's a TUI with no arg parsing — just confirm it's a runnable Mach-O binary.
          file "${BIN}" | grep -q 'Mach-O'

  release:
    needs: [build, verify]
    runs-on: macos-14
    steps:
      - name: Download packaged tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true
